<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simple JavaScript Runner</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 24px;
      background: #f6f7f9;
      color: #1f2937;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
    }

    textarea {
      box-sizing: border-box;
      width: 100%;
      min-height: 240px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      resize: vertical;
    }

    button {
      margin: 12px 8px 12px 0;
      padding: 8px 14px;
      border: 0;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button.secondary {
      background: #64748b;
    }

    pre {
      min-height: 120px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #111827;
      color: #e5e7eb;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>JavaScript Runner</h1>
    <textarea id="code">console.log("Hello, JavaScript!");
const total = 10 + 20;
console.log("total =", total);</textarea>
    <div>
      <button id="runButton">実行</button>
      <button id="clearButton" class="secondary">結果を消す</button>
    </div>
    <pre id="output">実行結果がここに表示されます。</pre>
  </main>

  <script>
    const codeInput = document.getElementById("code");
    const output = document.getElementById("output");
    const runButton = document.getElementById("runButton");
    const clearButton = document.getElementById("clearButton");

    function writeLine(value) {
      output.textContent += `${value}\n`;
    }

    runButton.addEventListener("click", () => {
      output.textContent = "";
      const originalLog = console.log;

      console.log = (...values) => {
        writeLine(values.map(String).join(" "));
        originalLog(...values);
      };

      try {
        new Function(codeInput.value)();
      } catch (error) {
        writeLine(`Error: ${error.message}`);
      } finally {
        console.log = originalLog;
      }
    });

    clearButton.addEventListener("click", () => {
      output.textContent = "";
    });
  </script>
</body>
</html>
